<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  	<meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0" />
  	<meta http-equiv="cache-control" content="max-age=0" />
  	<meta http-equiv="expires" content="0" />
  	<meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
  	<meta http-equiv="pragma" content="no-cache" />
	
	<title>LATT Calculator</title>
	<link rel="stylesheet" type="text/css" href="/css/main.css" />
	<script type="text/javascript" src="/js/script.js"></script>
</head>


<body>
	<div id="containerDiv" align="center">
		<form id="form">
			<table>
				<tr>
					<td colspan="2" align="center"><h1>LATT Calculator</h1></td>
				<tr>
					<td style="float: right"><label for="report-time">Initial report time (zulu):</label></td>
					<td><input type="datetime-local" id="report-time" name="report-time" min="00:00" max="23:59" required /></td>
				</tr>
				<tr>
					<td style="float: right"><label>Scheduled block time:</label></td>
					<td><input id="blockHours" style="width: 30px" type="number" min="0" max="23" maxlength="2" required> :
  						<input id="blockMinutes" style="width: 30px" type="number" min="0" max="59" maxlength="2" required>
  					</td>
				</tr>
				<tr>
					<td style="float: right"><label>Taxi time (minutes):</label></td>
					<td><input id="taxiTime" style="width: 30px" type="number" min="0" max="60" maxlength="2" required></td>
				</tr>
				<tr>
					<td style="float: right"><label for="crew-size">Crew size:</label></td>
					<td><select name="crew-size" id="crew-size" required >
						  <option value="0">2 person</option>
						  <option value="17">3 person</option>
						  <option value="20">4 person</option>
						</select>
					</td>
				</tr>
				<tr>
					<td colspan="2" align="center"><input type="submit" value="Submit" /></td>
				</tr>
			</table>	
		</form>
		<div id="latt-value"></div>
	</div>
</body>
</html>
