<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LATT Calculator</title>
	
	<!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-title" content="LATT Calculator">

    <!-- Android theme color -->
    <meta name="theme-color" content="#091d60">
	
	<link rel="stylesheet" type="text/css" href="main.css" />
	<script type="text/javascript" src="jquery-3.7.1.min.js"></script>
	<script type="text/javascript" src="script.js"></script>
</head>


<body>
	<div id="containerDiv" align="center">
		<form id="form">
			<table>
				<tr>
					<td colspan="2" align="center"><h1>LATT Calculator change</h1></td>
				<tr>
					<td style="float: right"><label for="report-time">Initial report time (zulu):</label></td>
					<td><input type="datetime-local" id="report-time" name="report-time" min="00:00" max="23:59" required /></td>
				</tr>
				<tr>
					<td style="float: right"><label for="block-hours">Scheduled block time:</label></td>
					<td><input id="block-hours" style="width: 30px" type="number" min="0" max="23" maxlength="2" required> :
  						<input id="block-minutes" style="width: 30px" type="number" min="0" max="59" maxlength="2" required>
  					</td>
				</tr>
				<!-- <tr>
					<td style="float: right"><label>Taxi time (minutes):</label></td>
					<td><input id="taxiTime" style="width: 30px" type="number" min="0" max="60" maxlength="2" required></td>
				</tr> -->
				<tr>
					<td style="float: right"><label for="crew-size">Crew size:</label></td>
					<td><select name="crew-size" id="crew-size" required >
						  <option value="0">2 person</option>
						  <option value="17">3 person</option>
						  <option value="20">4 person</option>
						</select>
					</td>
				</tr>
				<tr>
					<td colspan="2" align="center"><input type="submit" value="Submit" /></td>
				</tr>
			</table>	
		</form>
		<div id="latt-value"></div>
	</div>
	
	<!-- PWA: register service worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .catch(err => console.warn('Service worker registration failed:', err));
        }
    </script>
</body>
</html>
